apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-collector
  namespace: log-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      serviceAccountName: log-reader-sa
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: collector
          image: bitnami/kubectl:latest
          resources:
            limits: { cpu: "500m", memory: "512Mi" }
          command: ["/bin/bash", "-c"]
          args:
            - |
              LOG_BASE="/mnt/logs"
              declare -A ACTIVE_TAILS
              echo "[SYSTEM] Collector starting..."
              while true; do
                # Get all running pods except those in our own log-system namespace
                POD_LIST=$(kubectl get pods -A --field-selector=status.phase=Running --no-headers -o custom-columns=":metadata.namespace,:metadata.name" | awk '{print $1"/" $2}' | grep -v "log-system")
                
                # Attach to new pods
                for pod_ref in $POD_LIST; do
                  if [[ -z "${ACTIVE_TAILS[$pod_ref]}" ]]; then
                    NS=$(echo $pod_ref | cut -d'/' -f1)
                    POD=$(echo $pod_ref | cut -d'/' -f2)
                    mkdir -p "$LOG_BASE/$NS"
                    kubectl logs -f "$POD" -n "$NS" --all-containers=true --prefix=true --since=1m >> "$LOG_BASE/$NS/$POD.log" 2>&1 &
                    ACTIVE_TAILS[$pod_ref]=$!
                    echo "[ATTACH] $NS/$POD"
                  fi
                done

                # Cleanup dead pods
                for tracked in "${!ACTIVE_TAILS[@]}"; do
                  if [[ ! "$POD_LIST" =~ "$tracked" ]]; then
                    kill ${ACTIVE_TAILS[$tracked]} 2>/dev/null
                    unset ACTIVE_TAILS[$tracked]
                    echo "[DETACH] $tracked"
                  fi
                done
                sleep 30
              done
          volumeMounts:
            - name: log-storage
              mountPath: /mnt/logs
      volumes:
        - name: log-storage
          persistentVolumeClaim:
            claimName: log-nfs-pvc
