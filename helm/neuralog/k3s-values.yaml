image:
  collector:
    repository: localhost:5000/neuralog-collector
    tag: "dev"
    pullPolicy: Always
  ui:
    repository: localhost:5000/neuralog-ui
    tag: "dev"
    pullPolicy: Always

storage:
  storageClassName: "local-path"
  storageSize: 5Gi
  accessMode: ReadWriteOnce

service:
  type: NodePort
  port: 80

ingress:
  enabled: false

retention:
  days: 7

collector:
  redactEnabled: "true"

autoscaling:
  enabled: false

networkPolicy:
  enabled: false
