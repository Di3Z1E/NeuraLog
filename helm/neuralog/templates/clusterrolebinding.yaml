apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "neuralog.fullname" . }}-log-reader
  labels:
    {{- include "neuralog.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "neuralog.fullname" . }}-log-reader
subjects:
- kind: ServiceAccount
  name: {{ include "neuralog.serviceAccountName" . }}
  namespace: {{ include "neuralog.namespace" . }}
