apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neuralog.fullname" . }}
  namespace: {{ include "neuralog.namespace" . }}
  labels:
    {{- include "neuralog.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "neuralog.selectorLabels" . | nindent 6 }}
  # Recreate because the PVC is ReadWriteOnce; RollingUpdate would leave
  # two pods fighting over the same volume. Swap to RollingUpdate if using NFS.
  strategy:
    {{- if .Values.autoscaling.enabled }}
    type: RollingUpdate
    {{- else }}
    type: Recreate
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "neuralog.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "neuralog.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      containers:
        - name: neuralog
          image: {{ include "neuralog.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/neuralog", "serve"]
          envFrom:
            - configMapRef:
                name: {{ include "neuralog.fullname" . }}-config
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: logs
              mountPath: {{ .Values.collector.logBasePath }}
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "neuralog.fullname" . }}-logs-pvc
        - name: tmp
          emptyDir: {}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
