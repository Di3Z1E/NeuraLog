{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "neuralog.fullname" . }}
  namespace: {{ include "neuralog.namespace" . }}
  labels:
    {{- include "neuralog.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "neuralog.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow HTTP from anywhere (Ingress controller, direct access)
    - ports:
        - port: 80
          protocol: TCP

  egress:
    # Kubernetes API server (informer watch + log streaming)
    - ports:
        - port: 6443
          protocol: TCP
        - port: 443
          protocol: TCP

    {{- if .Values.nfs.server }}
    # NFS server
    - to:
        - ipBlock:
            cidr: {{ printf "%s/32" .Values.nfs.server }}
      ports:
        - port: 2049
          protocol: TCP
    {{- end }}

    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
