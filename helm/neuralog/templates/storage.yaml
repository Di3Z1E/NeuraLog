apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "neuralog.fullname" . }}-logs-pvc
  namespace: {{ include "neuralog.namespace" . }}
  labels:
    {{- include "neuralog.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.storage.accessMode }}
  {{- if .Values.storage.storageClassName }}
  storageClassName: {{ .Values.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.storageSize }}
