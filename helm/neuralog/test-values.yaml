# Minimal values for CI / helm lint — fast pull, no autoscaling, no ingress.
image:
  repository: ghcr.io/di3z1e/neuralog
  tag: "dev"
  pullPolicy: IfNotPresent

storage:
  storageClassName: "standard"
  storageSize: 1Gi

retention:
  days: 1

autoscaling:
  enabled: false

networkPolicy:
  enabled: false

ingress:
  enabled: false
