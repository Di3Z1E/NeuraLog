# ─── Image ────────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/di3z1e/neuralog
  tag: ""            # defaults to Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ─── Namespace ────────────────────────────────────────────────────────────────
namespaceOverride: "log-system"  # leave empty to use Release.Namespace

# ─── Collector config ─────────────────────────────────────────────────────────
collector:
  logBasePath: /mnt/logs
  listenAddr: ":8080"
  excludeNamespaces: "log-system,kube-system"
  redactEnabled: "true"   # "false" to disable for debugging

# ─── Retention ────────────────────────────────────────────────────────────────
retention:
  enabled: true
  schedule: "0 2 * * *"   # 02:00 UTC daily
  days: 7

# ─── Storage ──────────────────────────────────────────────────────────────────
storage:
  storageClassName: "local-path"
  storageSize: 10Gi
  accessMode: ReadWriteOnce

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8080

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: neuralog.example.com
  tls: []
    # - secretName: neuralog-tls
    #   hosts:
    #     - neuralog.example.com

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# ─── Autoscaling ──────────────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# ─── NFS ──────────────────────────────────────────────────────────────────────
nfs:
  server: ""   # NFS server IP; when set, a dedicated egress rule is added to the NetworkPolicy

# ─── Network Policy ───────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ─── Service Account ──────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""             # defaults to fullname
  annotations: {}

# ─── Pod Security ─────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# ─── Miscellaneous ────────────────────────────────────────────────────────────
replicaCount: 1
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
