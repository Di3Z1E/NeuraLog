worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log    /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # WebSocket upgrade mapping
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    upstream collector {
        # Both containers share the pod's network namespace, so localhost works.
        server localhost:8080;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;

        # WebSocket endpoint (must come before /api/ to get the longer match)
        location /ws {
            proxy_pass          http://collector;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection $connection_upgrade;
            proxy_set_header    Host       $host;
            proxy_set_header    X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # REST API proxy
        location /api/ {
            proxy_pass          http://collector;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    Connection        "";    # enable keepalive
            proxy_read_timeout  60s;
        }

        # Health passthrough
        location /healthz {
            proxy_pass http://collector;
        }

        # SPA — all non-asset paths serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long-cache for hashed assets
        location ~* \.(js|css|woff2?|ttf|svg|ico|png)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
