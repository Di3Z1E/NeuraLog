# Local dev overrides — hot-reload, source mounts, relaxed settings.
# This file is never committed to CI and is git-ignored in prod deployments.

services:
  neuralog:
    # Use Vite dev server for the UI — the Go binary serves only the API.
    # Access UI at http://localhost:3000, API at http://localhost:8080.
    image: neuralog:local
    environment:
      NEURALOG_REDACT_ENABLED: "false"   # easier to debug locally
      NEURALOG_LOG_BASE_PATH: /mnt/logs
      NEURALOG_LISTEN_ADDR: ":8080"
      KUBECONFIG: /root/.kube/config

  ui-dev:
    image: node:20-alpine
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ./ui:/app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
