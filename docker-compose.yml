services:
  neuralog:
    build:
      context: .
      dockerfile: docker/neuralog.Dockerfile
    image: ghcr.io/di3z1e/neuralog:dev
    ports:
      - "8080:8080"
    environment:
      NEURALOG_LOG_BASE_PATH: /mnt/logs
      NEURALOG_LISTEN_ADDR: ":8080"
      NEURALOG_RETENTION_DAYS: "7"
      NEURALOG_REDACT_ENABLED: "true"
      # Point at a real cluster:  KUBECONFIG: /root/.kube/config
    volumes:
      - log-data:/mnt/logs
      - ${HOME}/.kube:/root/.kube:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  log-data:
