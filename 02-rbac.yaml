apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-reader-sa
  namespace: log-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: global-log-reader-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: global-log-reader-binding
subjects:
- kind: ServiceAccount
  name: log-reader-sa
  namespace: log-system
roleRef:
  kind: ClusterRole
  name: global-log-reader-role
  apiGroup: rbac.authorization.k8s.io
