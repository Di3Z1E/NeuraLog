apiVersion: v1
kind: PersistentVolume
metadata:
  name: log-nfs-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: log-nfs-pvc
    namespace: log-system
  mountOptions:
    - nfsvers=3
    - nolock
    - tcp
    - rw
  nfs:
    server: 10.100.102.203
    path: "/logs"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: log-nfs-pvc
  namespace: log-system
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: ""
  volumeName: log-nfs-pv
  resources:
    requests:
      storage: 100Gi
