name: Helm Publish

# Publishes the Helm chart to GitHub Pages as a Helm repository.
# Runs after a GitHub Release is published (not pre-release).
#
# One-time setup required:
#   1. Create a gh-pages branch: git checkout --orphan gh-pages && git push origin gh-pages
#   2. Enable GitHub Pages on the gh-pages branch in repo Settings → Pages
#   3. The chart will be installable via:
#        helm repo add neuralog https://di3z1e.github.io/NeuraLog
#        helm install neuralog neuralog/neuralog

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: helm
          config: .cr.yaml
          skip_existing: true
