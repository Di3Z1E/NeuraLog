name: CI / UI

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ci-ui.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ci-ui.yml'

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile
        working-directory: ui

      - name: tsc --noEmit
        run: npx tsc --noEmit
        working-directory: ui

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile
        working-directory: ui

      - name: ESLint
        run: npm run lint
        working-directory: ui

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile
        working-directory: ui

      - name: Vite build
        run: npm run build
        working-directory: ui

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 3
