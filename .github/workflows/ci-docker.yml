name: CI / Docker

# Build-only check on PRs — verifies the Dockerfile stays buildable.
# No push. Actual image publishing is handled by release.yml.

on:
  pull_request:
    branches: [main]
    paths:
      - 'collector/**'
      - 'ui/**'
      - 'docker/**'
      - '.github/workflows/ci-docker.yml'

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/neuralog.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
