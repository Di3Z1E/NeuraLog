name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  COLLECTOR_IMAGE: ghcr.io/di3z1e/neuralog-collector
  UI_IMAGE: ghcr.io/di3z1e/neuralog-ui

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────────
  gate:
    name: Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: collector/go.mod
          cache-dependency-path: collector/go.sum

      - name: Go tests
        run: go test ./... -race -count=1
        working-directory: collector

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.4'

      - name: Helm lint
        run: |
          helm lint helm/neuralog \
            --set image.collector.tag=${{ github.ref_name }} \
            --set image.ui.tag=${{ github.ref_name }} \
            --strict

  # ── Images ───────────────────────────────────────────────────────────────────
  build-collector:
    name: Build & Push Collector
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.COLLECTOR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/collector.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ui:
    name: Build & Push UI
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.UI_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ui.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-collector, build-ui]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.4'

      - name: Package Helm chart
        run: |
          helm package helm/neuralog \
            --version ${{ github.ref_name }} \
            --app-version ${{ github.ref_name }} \
            --destination .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: '*.tgz'
